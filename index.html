<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNMOSA 健喬信元 — 內部系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080c14;
      --surface:  #0d1220;
      --border:   #1c2438;
      --accent:   #00b4d8;
      --accent2:  #0077b6;
      --text:     #e2e8f4;
      --text-mid: #8896b0;
      --text-dim: #3a4560;
      --danger:   #e05c6a;
      --success:  #00c896;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
    }

    /* 背景細格線 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,180,216,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,180,216,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* 頂部光暈 */
    body::after {
      content: '';
      position: fixed;
      top: -300px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(0,119,182,0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    /* 主體置中 */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* 頂部品牌 */
    .brand {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      margin-bottom: 20px;
      position: relative;
    }

    .brand-logo::after {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(0,180,216,0.25);
      border-radius: 3px;
    }

    .brand-logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      color: var(--accent);
      line-height: 1;
    }

    .brand-name-en {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 0.15em;
      color: var(--text);
      line-height: 1;
    }

    .brand-name-zh {
      font-size: 15px;
      font-weight: 300;
      color: var(--text-mid);
      letter-spacing: 0.3em;
      margin-top: 6px;
    }

    .brand-divider {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 16px auto 0;
      opacity: 0.5;
    }

    /* 登入卡 */
    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 頂部藍線 */
    .card-topbar {
      height: 3px;
      background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent2));
    }

    .card-body { padding: 40px; }

    /* 狀態標籤 */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--success);
      letter-spacing: 0.08em;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,200,150,0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0,200,150,0); }
    }

    .status-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    /* 標題 */
    .card-title {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.2px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-mid);
      font-weight: 300;
      margin-bottom: 32px;
    }

    /* 錯誤訊息 */
    .error-msg {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(224,92,106,0.08);
      border: 1px solid rgba(224,92,106,0.25);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: var(--danger);
    }
    .error-msg.show { display: flex; animation: shake 0.35s ease; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%,75%  { transform: translateX(-5px); }
      50%      { transform: translateX(5px); }
    }

    .error-icon {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--danger);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--danger);
    }

    /* 表單 */
    .form-group { margin-bottom: 20px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-mid);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 13px 16px;
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,180,216,0.1);
    }

    input::placeholder {
      color: var(--text-dim);
      font-size: 13px;
    }

    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    .toggle-pw:hover {
      color: var(--accent);
      background: rgba(0,180,216,0.08);
    }

    /* 登入按鈕 */
    .btn-login {
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #07080f;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-login:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(0,180,216,0.3);
    }

    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-text { position: relative; z-index: 1; }

    .spinner {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #07080f;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { opacity: 0; }

    @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* 底部 */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.15);
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }

    .footer-lock {
      width: 12px; height: 12px;
      border: 1.5px solid var(--text-dim);
      border-radius: 2px;
      position: relative;
    }

    .footer-lock::before {
      content: '';
      position: absolute;
      top: -5px; left: 1.5px;
      width: 6px; height: 6px;
      border: 1.5px solid var(--text-dim);
      border-bottom: none;
      border-radius: 3px 3px 0 0;
    }

    .footer-right {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>

<div class="page">

  <!-- 品牌區 -->
  <div class="brand">
    <div class="brand-logo">
      <span class="brand-logo-text">S</span>
    </div>
    <div class="brand-name-en">SYNMOSA</div>
    <div class="brand-name-zh">健喬信元醫藥集團</div>
    <div class="brand-divider"></div>
  </div>

  <!-- 登入卡 -->
  <div class="card">
    <div class="card-topbar"></div>
    <div class="card-body">

      <div class="status-row">
        <div class="status-badge">
          <div class="status-dot"></div>
          系統連線正常
        </div>
        <div class="status-time" id="clockTime">--:--:--</div>
      </div>

      <div class="card-title">員工登入</div>
      <div class="card-sub">請使用您的內部帳號登入系統</div>

      <div class="error-msg" id="errorMsg">
        <div class="error-icon">!</div>
        <span id="errorText">帳號或密碼錯誤，請重新輸入</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="username">帳號</label>
        <div class="input-wrap">
          <input
            type="text"
            id="username"
            placeholder="請輸入您的帳號"
            autocomplete="username"
            spellcheck="false"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密碼</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            placeholder="請輸入您的密碼"
            autocomplete="current-password"
            style="padding-right: 60px;"
          />
          <button class="toggle-pw" type="button" id="togglePw">顯示</button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" type="button">
        <span class="btn-text">登入系統</span>
        <div class="spinner"></div>
      </button>

    </div>

    <div class="card-footer">
      <div class="footer-left">
        <div class="footer-lock"></div>
        SSL 加密連線保護
      </div>
      <div class="footer-right">v2.0.1 · 僅限內部使用</div>
    </div>
  </div>

</div>

<script>
  // ============================================
  // ⚙️ 請修改這兩個設定
  // ============================================
   const N8N_LOGIN_URL = 'https://rick0740-n8n-free.hf.space/webhook/login';  
   const REDIRECT_URL = 'https://rick0740.github.io/n8n/chat.html';  
 //const N8N_LOGIN_URL = 'https://rick0740-n8n-free.hf.space/webhook-test/login';
 //const REDIRECT_URL  = 'https://rick0740-n8n-free.hf.space';
 //很醜的n8n chat 介面
 //const REDIRECT_URL = 'https://rick0740-n8n-free.hf.space/webhook/3335c50c-f72c-4cbe-8554-7e397390ba38/chat'; 
   
 
 // ============================================

  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn      = document.getElementById('loginBtn');
  const errorMsg      = document.getElementById('errorMsg');
  const errorText     = document.getElementById('errorText');
  const togglePw      = document.getElementById('togglePw');

  togglePw.addEventListener('click', () => {
    const show = passwordInput.type === 'password';
    passwordInput.type = show ? 'text' : 'password';
    togglePw.textContent = show ? '隱藏' : '顯示';
  });

  [usernameInput, passwordInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
    el.addEventListener('input', () => errorMsg.classList.remove('show'));
  });

  loginBtn.addEventListener('click', handleLogin);

  function setLoading(on) {
    loginBtn.disabled = on;
    loginBtn.classList.toggle('loading', on);
  }

  async function handleLogin() {
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();
    errorMsg.classList.remove('show');

    if (!username || !password) {
      errorText.textContent = '請輸入帳號與密碼';
      errorMsg.classList.add('show');
      return;
    }

    setLoading(true);
    try {
      const res = await fetch(N8N_LOGIN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (data.success && data.token) {
        localStorage.setItem('auth_token', data.token);
        localStorage.setItem('auth_user', data.username);
        localStorage.setItem('auth_expires', data.expiresAt);
        window.location.href = REDIRECT_URL;
      } else {
        errorText.textContent = data.message || '帳號或密碼錯誤，請重新輸入';
        errorMsg.classList.add('show');
        passwordInput.value = '';
        passwordInput.focus();
      }
    } catch (err) {
      errorText.textContent = '連線失敗，請稍後再試';
      errorMsg.classList.add('show');
    } finally {
      setLoading(false);
    }
  }

  (function() {
    const token   = localStorage.getItem('auth_token');
    const expires = localStorage.getItem('auth_expires');
    if (token && expires && new Date(expires) > new Date()) {
      window.location.href = REDIRECT_URL;
    }
  })();

  function updateClock() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('clockTime').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
  usernameInput.focus();
</script>
</body>
</html>
