<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYNMOSA 健喬信元 — 業績查詢</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f0f2f5;
      --sidebar:    #ffffff;
      --border:     #e2e8f0;
      --accent:     #0077b6;
      --accent-lt:  #e6f3fb;
      --accent-2:   #00b4d8;
      --text:       #1a202c;
      --text-mid:   #4a5568;
      --text-dim:   #a0aec0;
      --bubble-ai:  #f7f9fc;
      --bubble-usr: #0077b6;
      --success:    #38a169;
      --danger:     #e53e3e;
      --radius:     12px;
    }

    html, body { height: 100%; font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

    .layout { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }

    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100vh;
    }

    .sidebar-header { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }

    .brand-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }

    .brand-icon {
      width: 32px; height: 32px;
      background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-family: 'JetBrains Mono', monospace;
      font-size: 14px; font-weight: 500; flex-shrink: 0;
    }

    .brand-name { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: 0.05em; }
    .brand-sub { font-size: 11px; color: var(--text-dim); margin-left: 42px; }

    .user-card {
      margin: 16px 20px;
      background: var(--accent-lt);
      border: 1px solid rgba(0,119,182,0.15);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }

    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; flex-shrink: 0;
    }

    .user-name { font-size: 13px; font-weight: 500; color: var(--accent); }
    .user-role { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    .sidebar-nav { flex: 1; padding: 8px 12px; overflow-y: auto; }

    .nav-section-label {
      font-size: 10px; font-weight: 600; color: var(--text-dim);
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 12px 8px 6px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      cursor: pointer; font-size: 13px; color: var(--text-mid);
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px; border: none; background: none;
      width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--accent-lt); color: var(--accent); font-weight: 500; }

    .nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.7; }
    .nav-item.active .nav-icon { opacity: 1; }

    .nav-badge {
      margin-left: auto;
      background: var(--accent); color: #fff;
      font-size: 10px; padding: 2px 7px;
      border-radius: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }

    .btn-logout {
      display: flex; align-items: center; gap: 10px;
      width: 100%; padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: none; color: var(--text-mid);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 13px; cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-logout:hover { background: #fff5f5; color: var(--danger); border-color: rgba(229,62,62,0.3); }

    .main { display: flex; flex-direction: column; height: 100vh; background: #fff; }

    .main-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }

    .header-title { font-size: 16px; font-weight: 600; color: var(--text); }
    .header-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      background: #f0fff4;
      border: 1px solid rgba(56,161,105,0.2);
      border-radius: 20px; padding: 5px 12px;
      font-size: 12px; color: var(--success); font-weight: 500;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%; background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .btn-clear {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 14px; border-radius: 8px;
      border: 1px solid var(--border); background: none;
      color: var(--text-mid);
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 12px; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-clear:hover { background: var(--bg); color: var(--text); }

    .chat-area {
      flex: 1; overflow-y: auto;
      padding: 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .welcome-card {
      background: linear-gradient(135deg, #e6f3fb, #f0f9ff);
      border: 1px solid rgba(0,119,182,0.15);
      border-radius: var(--radius);
      padding: 20px 24px; margin-bottom: 8px;
    }
    .welcome-title { font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
    .welcome-text { font-size: 13px; color: var(--text-mid); line-height: 1.6; }

    .quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }

    .quick-btn {
      padding: 7px 14px;
      background: #fff;
      border: 1px solid rgba(0,119,182,0.2);
      border-radius: 20px; font-size: 12px; color: var(--accent);
      cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      transition: background 0.15s, border-color 0.15s;
    }
    .quick-btn:hover { background: var(--accent-lt); border-color: var(--accent); }

    .msg-row {
      display: flex; gap: 10px;
      animation: msgIn 0.25s ease both;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 600; margin-top: 2px;
    }
    .msg-avatar.ai { background: var(--accent-lt); color: var(--accent); border: 1px solid rgba(0,119,182,0.2); }
    .msg-avatar.user { background: var(--accent); color: #fff; }

    .msg-content { max-width: 70%; }
    .msg-name { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; font-weight: 500; }
    .msg-row.user .msg-name { text-align: right; }

    .msg-bubble {
      padding: 12px 16px; border-radius: 12px;
      font-size: 14px; line-height: 1.7; word-break: break-word;
    }
    .msg-bubble.ai { background: var(--bubble-ai); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-bubble.user { background: var(--bubble-usr); color: #fff; border-bottom-right-radius: 4px; }

    .msg-time { font-size: 10px; color: var(--text-dim); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
    .msg-row.user .msg-time { text-align: right; }

    .typing-indicator { display: none; align-items: center; gap: 10px; }
    .typing-indicator.show { display: flex; }

    .typing-dots {
      display: flex; gap: 4px;
      background: var(--bubble-ai); border: 1px solid var(--border);
      padding: 12px 16px; border-radius: 12px; border-bottom-left-radius: 4px;
    }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim); animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%,60%,100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    .input-area { padding: 16px 24px; border-top: 1px solid var(--border); flex-shrink: 0; background: #fff; }

    .input-row {
      display: flex; gap: 10px; align-items: flex-end;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 12px; padding: 10px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,119,182,0.08); }

    #chatInput {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 14px; color: var(--text);
      resize: none; max-height: 120px; line-height: 1.6;
    }
    #chatInput::placeholder { color: var(--text-dim); }

    .btn-send {
      width: 36px; height: 36px;
      background: var(--accent); border: none; border-radius: 8px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    }
    .btn-send:hover { background: #005f8a; }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-send svg { width: 16px; height: 16px; fill: #fff; }

    .input-hint { font-size: 11px; color: var(--text-dim); margin-top: 8px; text-align: center; }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="brand-row">
        <div class="brand-icon">S</div>
        <div class="brand-name">SYNMOSA</div>
      </div>
      <div class="brand-sub">健喬信元醫藥集團</div>
    </div>

    <div class="user-card">
      <div class="user-avatar" id="userAvatar">--</div>
      <div>
        <div class="user-name" id="userName">載入中...</div>
        <div class="user-role">內部員工</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">工作區</div>
      <button class="nav-item active">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        業績查詢
        <span class="nav-badge" id="msgCount">0</span>
      </button>

      <div class="nav-section-label" style="margin-top:8px;">說明</div>
      <button class="nav-item" onclick="sendQuick('我可以查詢哪些資料？')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        使用說明
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        登出系統
      </button>
    </div>
  </aside>

  <main class="main">
    <header class="main-header">
      <div>
        <div class="header-title">業績查詢助理</div>
        <div class="header-sub">AI 智能查詢 · 即時回應</div>
      </div>
      <div class="header-right">
        <div class="status-pill">
          <div class="status-dot"></div>
          AI 服務正常
        </div>
        <button class="btn-clear" onclick="clearChat()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-3.96"/>
          </svg>
          清除對話
        </button>
      </div>
    </header>

    <div class="chat-area" id="chatArea">
      <div class="welcome-card">
        <div class="welcome-title" id="welcomeTitle">👋 您好，歡迎使用業績查詢系統</div>
        <div class="welcome-text">您可以直接輸入問題，AI 助理將幫您查詢業績相關資料。例如：查詢特定商品銷售狀況、業務員業績排名、客戶訂單資訊等。</div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="sendQuick('2025年業績最好的商品是哪個？')">🏆 最佳商品</button>
          <button class="quick-btn" onclick="sendQuick('業務員業績排名如何？')">📊 業績排名</button>
          <button class="quick-btn" onclick="sendQuick('本月總銷售金額是多少？')">💰 本月業績</button>
          <button class="quick-btn" onclick="sendQuick('我可以查詢哪些資料？')">❓ 使用說明</button>
        </div>
      </div>
      <div class="typing-indicator" id="typingIndicator">
        <div class="msg-avatar ai">AI</div>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="chatInput" placeholder="輸入您的問題，例如：2025年銷售最好的商品是？" rows="1"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
      <div class="input-hint">按 Enter 送出，Shift+Enter 換行</div>
    </div>
  </main>
</div>

<script>
  // ============================================
  // ⚙️ 設定區
  // ============================================
  const N8N_CHAT_URL = 'https://rick0740-n8n-free.hf.space/webhook/3335c50c-f72c-4cbe-8554-7e397390ba38/chat';
  const LOGIN_URL    = 'https://rick0740.github.io/n8n/';
  // ============================================

  // 改用 sessionStorage 驗證，關閉頁籤自動登出
  const token    = sessionStorage.getItem('auth_token');
  const username = sessionStorage.getItem('auth_user');
  const expires  = sessionStorage.getItem('auth_expires');

  if (!token || !expires || new Date(expires) < new Date()) {
    window.location.href = LOGIN_URL;
  }

  // 顯示使用者資訊
  if (username) {
    document.getElementById('userName').textContent = username;
    document.getElementById('userAvatar').textContent = username.slice(0, 2).toUpperCase();
    document.getElementById('welcomeTitle').textContent = `👋 ${username}，歡迎使用業績查詢系統`;
  }

  // 用 Token 當 sessionId，供 n8n 驗證使用
  const sessionId = token;

  let msgCount  = 0;
  let isLoading = false;

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.getElementById('chatInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  function getTime() {
    const now = new Date();
    return `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  }

  function addMessage(content, type) {
    const chatArea = document.getElementById('chatArea');
    const typingEl = document.getElementById('typingIndicator');
    const row = document.createElement('div');
    row.className = `msg-row ${type}`;
    const avatarText = type === 'user' ? (username || 'U').slice(0,2).toUpperCase() : 'AI';
    const nameText   = type === 'user' ? (username || '員工') : 'AI 助理';
    row.innerHTML = `
      <div class="msg-avatar ${type}">${avatarText}</div>
      <div class="msg-content">
        <div class="msg-name">${nameText}</div>
        <div class="msg-bubble ${type}">${content.replace(/\n/g, '<br>')}</div>
        <div class="msg-time">${getTime()}</div>
      </div>`;
    chatArea.insertBefore(row, typingEl);
    chatArea.scrollTop = chatArea.scrollHeight;
    if (type === 'user') {
      msgCount++;
      document.getElementById('msgCount').textContent = msgCount;
    }
  }

  function setTyping(show) {
    document.getElementById('typingIndicator').classList.toggle('show', show);
    document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg   = input.value.trim();
    if (!msg || isLoading) return;

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;

    addMessage(msg, 'user');
    setTyping(true);

    try {
      const res = await fetch(N8N_CHAT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'sendMessage',
          sessionId: sessionId,  // Token 當 sessionId，供 n8n 驗證
          chatInput: msg
        })
      });
      const data = await res.json();
      setTyping(false);
      const reply = data.output || data.text || data.message || '抱歉，無法取得回應，請稍後再試。';
      addMessage(reply, 'ai');
    } catch (err) {
      setTyping(false);
      addMessage('連線失敗，請確認網路後再試。', 'ai');
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
      input.focus();
    }
  }

  function sendQuick(msg) {
    document.getElementById('chatInput').value = msg;
    sendMessage();
  }

  function clearChat() {
    if (!confirm('確定要清除所有對話紀錄嗎？')) return;
    const chatArea = document.getElementById('chatArea');
    const typingEl = document.getElementById('typingIndicator');
    const welcomeEl = chatArea.querySelector('.welcome-card');
    Array.from(chatArea.children).forEach(el => {
      if (el !== typingEl && el !== welcomeEl) el.remove();
    });
    msgCount = 0;
    document.getElementById('msgCount').textContent = 0;
  }

  function logout() {
    if (!confirm('確定要登出嗎？')) return;
    sessionStorage.clear();
    window.location.href = LOGIN_URL;
  }
</script>
</body>
</html>
